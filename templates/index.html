<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SMS SaaS</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

.card{
background:#1e293b;
padding:20px;
margin:20px auto;
width:400px;
border-radius:10px;
}

input,button{
margin:5px;
padding:10px;
width:90%;
border-radius:5px;
border:none;
}

button{
background:#22c55e;
color:white;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

.device{
background:#334155;
margin:10px;
padding:10px;
border-radius:8px;
}
</style>
</head>

<body>

<h1>🚀 SMS SaaS Dashboard</h1>

<div class="card">
<h2>📱 Ajouter Device</h2>

<input id="name" placeholder="Nom du téléphone">
<input id="device_id" placeholder="Device ID">
<input id="username" placeholder="API Username">
<input id="password" placeholder="API Password">

<button onclick="addDevice()">Ajouter</button>
</div>

<div class="card">
<h2>📨 Message</h2>
<input id="message" placeholder="Ton message">
<button onclick="setMessage()">Enregistrer</button>
</div>

<div class="card">
<h2>⚙️ Paramètres</h2>
<input id="delay" placeholder="Delay (sec)">
<input id="pause_every" placeholder="Pause tous les X SMS">
<input id="pause_time" placeholder="Temps pause (sec)">
<button onclick="setSettings()">Sauvegarder</button>
</div>

<div class="card">
<h2>📂 Upload CSV</h2>
<input type="file" id="file">
<button onclick="upload()">Uploader</button>
</div>

<div class="card">
<h2>🤖 Bot</h2>
<button onclick="start()">START</button>
<button onclick="pause()">PAUSE</button>
<button onclick="resume()">RESUME</button>
</div>

<div class="card">
<h2>📱 Devices</h2>
<div id="devices"></div>
</div>

<script>

// ===== ADD DEVICE =====
function addDevice(){

let n = document.getElementById("name").value
let d = document.getElementById("device_id").value
let u = document.getElementById("username").value
let p = document.getElementById("password").value

fetch("/add_device",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify({
name: n,
device_id: d,
username: u,
password: p
})
})
.then(res=>res.json())
.then(data=>{
console.log(data)

if(data.status=="ok"){
alert("✅ Device ajouté")
loadDevices()
}else{
alert("❌ Erreur: "+data.message)
}
})
}

// ===== LOAD DEVICES =====
function loadDevices(){
fetch("/devices")
.then(res=>res.json())
.then(data=>{
let html=""
data.devices.forEach(d=>{
html+=`
<div class="device">
<b>${d.name}</b><br>
ID: ${d.device_id}<br>
<button onclick="deleteDevice('${d.name}')">❌ Delete</button>
<button onclick="toggleDevice('${d.name}')">🔄 Toggle</button>
</div>
`
})
document.getElementById("devices").innerHTML=html
})
}

// ===== DELETE =====
function deleteDevice(name){
fetch("/delete_device",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name:name})
})
.then(()=>loadDevices())
}

// ===== TOGGLE =====
function toggleDevice(name){
fetch("/toggle_device",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name:name})
})
.then(()=>loadDevices())
}

// ===== MESSAGE =====
function setMessage(){
let m = document.getElementById("message").value
fetch("/set_message",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:m})
})
alert("✅ Message sauvegardé")
}

// ===== SETTINGS =====
function setSettings(){
fetch("/set_settings",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
delay:document.getElementById("delay").value,
pause_every:document.getElementById("pause_every").value,
pause_time:document.getElementById("pause_time").value
})
})
alert("✅ Paramètres sauvegardés")
}

// ===== UPLOAD =====
function upload(){
let f = document.getElementById("file").files[0]
let formData = new FormData()
formData.append("file", f)

fetch("/upload",{
method:"POST",
body:formData
})
.then(()=>alert("✅ Upload OK"))
}

// ===== BOT =====
function start(){ fetch("/start",{method:"POST"}) }
function pause(){ fetch("/pause",{method:"POST"}) }
function resume(){ fetch("/resume",{method:"POST"}) }

// AUTO LOAD
loadDevices()

</script>

</body>
</html>
